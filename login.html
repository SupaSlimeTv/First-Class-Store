<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — First Class Store</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080b;color:#e0e0ee;font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none}
.card{background:#0f0f14;border:1px solid #262630;border-radius:12px;padding:48px 44px;width:420px;max-width:95vw;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.logo{font-size:36px;margin-bottom:8px}
h1{font-size:24px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.sub{font-size:13px;color:#60607a;margin-bottom:36px;line-height:1.6}
.btn{display:inline-flex;align-items:center;gap:12px;background:#5865f2;color:#fff;border:none;border-radius:8px;padding:14px 28px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;text-decoration:none;transition:all .15s;width:100%;justify-content:center}
.btn:hover{background:#4752c4;transform:translateY(-1px);box-shadow:0 8px 24px rgba(88,101,242,.3)}
.error{background:rgba(255,59,59,.1);border:1px solid rgba(255,59,59,.3);border-radius:6px;padding:12px;font-size:13px;color:#ff3b3b;margin-bottom:20px;display:none}
.error.show{display:block}
.footer{margin-top:28px;font-size:11px;color:#40404a}
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚡</div>
  <h1>First Class Store</h1>
  <p class="sub">Owner &amp; Admin Dashboard<br>Sign in with Discord to manage your server.</p>
  <div id="error-box" class="error"></div>
  <a href="/auth/login" class="btn">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
    Login with Discord
  </a>
  <p class="footer">Only server owners and admins can access the dashboard.</p>
</div>
<script>
  const p = new URLSearchParams(location.search);
  const err = p.get('error');
  if (err) {
    const el = document.getElementById('error-box');
    const msgs = { no_code:'Authorization cancelled.', token_failed:'Failed to get token. Try again.', user_failed:'Could not fetch your Discord profile.', oauth_error:'OAuth error. Try again.' };
    el.textContent = msgs[err] || 'Login failed. Try again.';
    el.classList.add('show');
  }
</script>
</body>
</html>
