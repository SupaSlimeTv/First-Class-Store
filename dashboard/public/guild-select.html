<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Server — First Class Store</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080b;color:#e0e0ee;font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 24px}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none}
.header{text-align:center;margin-bottom:32px}
.logo{font-size:36px;margin-bottom:8px}
h1{font-size:24px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#fff}
.sub{font-size:13px;color:#60607a;margin-top:6px}
.user-bar{display:flex;align-items:center;gap:10px;background:#0f0f14;border:1px solid #262630;border-radius:8px;padding:10px 16px;margin-bottom:36px;font-size:13px;max-width:860px;width:100%}
.user-bar img{width:28px;height:28px;border-radius:50%}
.user-bar a{color:#60607a;text-decoration:none;margin-left:auto;font-size:11px;transition:.15s}
.user-bar a:hover{color:#ff3b3b}
.section{width:100%;max-width:860px;margin-bottom:32px}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#40404a;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:#1e1e28}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.guild-wrap{position:relative}
.guild-card{background:#0f0f14;border:1px solid #262630;border-radius:10px;padding:18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s;text-decoration:none;color:inherit;overflow:hidden;display:block}
.guild-card:hover{border-color:#ff3b3b;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.guild-card .badge{position:absolute;bottom:10px;left:10px;background:rgba(46,204,113,.15);color:#2ecc71;border:1px solid rgba(46,204,113,.3);border-radius:4px;font-size:9px;font-weight:700;padding:2px 6px;text-transform:uppercase;letter-spacing:.06em;z-index:2}
.guild-inner{display:flex;align-items:center;gap:14px}
.remove-btn{position:absolute;top:8px;right:8px;background:rgba(255,59,59,.15);border:1px solid rgba(255,59,59,.3);color:#ff3b3b;border-radius:50%;width:22px;height:22px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;font-weight:700;z-index:10;line-height:1}
.remove-btn:hover{background:rgba(255,59,59,.35);border-color:#ff3b3b;transform:scale(1.1)}
.add-card{background:#0f0f14;border:1px solid #262630;border-radius:10px;padding:18px;display:flex;align-items:center;gap:14px;transition:all .15s;color:inherit}
.add-card:hover{border-color:#5865f2;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.add-btn{margin-left:auto;flex-shrink:0;background:#5865f2;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:.15s;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.add-btn:hover{background:#4752c4}
.guild-icon{width:48px;height:48px;border-radius:12px;background:#1e1e28;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0;overflow:hidden;color:#fff}
.guild-icon img{width:48px;height:48px;object-fit:cover}
.guild-name{font-weight:700;font-size:15px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.guild-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:#40404a}
.empty{text-align:center;color:#40404a;font-size:14px;padding:32px;background:#0f0f14;border:1px solid #1e1e28;border-radius:10px}
.loading{text-align:center;color:#60607a;padding:48px;font-size:14px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">⚡</div>
  <h1>First Class Store</h1>
  <p class="sub">Select a server to manage</p>
</div>

<div class="user-bar" id="user-bar">
  <span style="color:#60607a">Loading...</span>
</div>

<div id="content" style="width:100%;max-width:860px">
  <div class="loading">Loading your servers...</div>
</div>

<script>
async function load() {
  try {
    const me = await fetch('/auth/me').then(r => r.ok ? r.json() : null);
    if (!me) { location.href = '/login.html'; return; }

    document.getElementById('user-bar').innerHTML =
      (me.avatar ? '<img src="https://cdn.discordapp.com/avatars/' + me.id + '/' + me.avatar + '.png?size=32">' : '⚡') +
      '<span>Logged in as <strong>' + me.username + '</strong></span>' +
      '<a href="/auth/logout">Logout</a>';

    const resp = await fetch('/api/my-guilds', { credentials: 'include' });

    // Token expired or session invalid
    if (resp.status === 401) {
      document.getElementById('content').innerHTML =
        '<div class="empty" style="padding:40px;text-align:center">' +
        '<div style="font-size:32px;margin-bottom:12px">🔑</div>' +
        '<div style="font-size:16px;font-weight:600;margin-bottom:8px">Session Expired</div>' +
        '<div style="color:#666;margin-bottom:20px">Your Discord login has expired. Click below to log back in.</div>' +
        '<a href="/auth/login" style="background:#5865f2;color:#fff;padding:10px 24px;border-radius:6px;text-decoration:none;font-weight:600">🔄 Re-Login with Discord</a>' +
        '</div>';
      return;
    }

    const data = resp.ok ? await resp.json() : { botGuilds: [], addableGuilds: [] };

    const botGuilds     = Array.isArray(data) ? data        : (data.botGuilds     || []);
    const addableGuilds = Array.isArray(data) ? []          : (data.addableGuilds || []);
    window._clientId    = data.clientId || '';

    const content = document.getElementById('content');
    let html = '';

    // ── Managed servers ────────────────────────────────────
    html += '<div class="section">';
    html += '<div class="section-label">🟢 Manage — Bot is in these servers</div>';
    html += '<div class="grid">';

    if (!botGuilds.length) {
      html += '<div class="empty">No managed servers yet. Add the bot to a server below.</div>';
    } else {
      botGuilds.forEach(function(g) {
        var icon = g.icon ? '<img src="' + g.icon + '">' : g.name.charAt(0).toUpperCase();
        html += '<div class="guild-wrap">';
        html += '<a class="guild-card" href="/dashboard/' + g.id + '">';
        html += '<div class="guild-inner">';
        html += '<div class="guild-icon">' + icon + '</div>';
        html += '<div><div class="guild-name">' + g.name + '</div><div class="guild-id">' + g.id + '</div></div>';
        html += '</div>';
        html += '<div class="badge">Manage</div>';
        html += '</a>';
        html += '<button class="remove-btn" onclick="removeBot(\'' + g.id + '\',\'' + g.name.replace(/'/g,"\\'") + '\',event)" title="Remove bot">✕</button>';
        html += '</div>';
      });
    }
    html += '</div></div>';

    // ── Addable servers ────────────────────────────────────
    if (addableGuilds.length) {
      html += '<div class="section">';
      html += '<div class="section-label">➕ Add Bot — You have admin in these servers</div>';
      html += '<div class="grid">';
      addableGuilds.forEach(function(g) {
        var icon = g.icon ? '<img src="' + g.icon + '">' : g.name.charAt(0).toUpperCase();
        html += '<div class="add-card">';
        html += '<div class="guild-icon">' + icon + '</div>';
        html += '<div style="min-width:0"><div class="guild-name">' + g.name + '</div><div class="guild-id">' + g.id + '</div></div>';
        html += '<button class="add-btn" onclick="addBot(\'' + g.id + '\',\'' + g.name.replace(/'/g,"\\'") + '\')">+ Add Bot</button>';
        html += '</div>';
      });
      html += '</div></div>';
    }

    content.innerHTML = html;
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty">Error loading servers. <a href="#" onclick="load()" style="color:#ff3b3b">Retry</a></div>';
  }
}

function addBot(guildId, name) {
  var cid = window._clientId;
  if (!cid) { alert('Client ID not loaded. Refresh and try again.'); return; }
  var url = 'https://discord.com/oauth2/authorize?client_id=' + cid + '&permissions=8&scope=bot%20applications.commands&guild_id=' + guildId + '&disable_guild_select=true';
  window.open(url, '_blank', 'width=500,height=700');
}

async function removeBot(guildId, name, event) {
  event.preventDefault();
  event.stopPropagation();
  var btn = event.target;
  // First click — turn red and show "Sure?"
  if (btn.dataset.confirm !== '1') {
    btn.dataset.confirm = '1';
    btn.textContent = '?';
    btn.style.background = 'rgba(255,59,59,.6)';
    btn.title = 'Click again to confirm';
    setTimeout(function() {
      btn.dataset.confirm = '0';
      btn.textContent = '✕';
      btn.style.background = '';
      btn.title = 'Remove bot from server';
    }, 3000);
    return;
  }
  // Second click — actually remove
  btn.textContent = '…';
  btn.disabled = true;
  try {
    var r = await fetch('/api/' + guildId + '/leave', { method: 'POST', credentials: 'include' }).then(r => r.json());
    if (r.success) { load(); }
    else { btn.textContent = '✕'; btn.disabled = false; alert(r.error || 'Failed to remove bot.'); }
  } catch(e) { btn.textContent = '✕'; btn.disabled = false; }
}

load();
</script>
</body>
</html>
