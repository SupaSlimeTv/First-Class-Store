<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Select Server</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080b;--bg2:#0f0f14;--bg3:#16161e;--bg4:#1e1e28;--border:#262630;--border2:#343444;--text:#e0e0ee;--muted:#60607a;--accent:#ff3b3b;--gold:#f5c518;--green:#2ecc71;--blue:#5865f2;--orange:#ff6b35}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:48px 16px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);pointer-events:none;z-index:0}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,59,59,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,59,59,.03) 1px,transparent 1px);background-size:40px 40px;z-index:0;animation:gridDrift 20s linear infinite}
@keyframes gridDrift{0%{background-position:0 0}100%{background-position:40px 40px}}
.glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:700px;height:400px;background:radial-gradient(ellipse,rgba(255,59,59,.06) 0%,transparent 70%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;width:100%;max-width:680px}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px}
.logo-mark{font-size:18px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.1em}
.logo-sub{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px}
.user-chip{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 14px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--bg4);object-fit:cover}
.user-avatar-placeholder{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.user-name{font-size:13px;font-weight:600}
.btn-logout{background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 10px;border-radius:3px;cursor:pointer;transition:all .15s}
.btn-logout:hover{color:var(--accent);border-color:var(--accent)}

/* HEADING */
.heading{margin-bottom:28px}
.heading h1{font-size:24px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.heading p{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.6}

/* SERVER GRID */
.server-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}

.server-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px 18px;cursor:pointer;transition:all .2s;text-decoration:none;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;position:relative;overflow:hidden}
.server-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transition:transform .2s}
.server-card:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.server-card:hover::before{transform:scaleX(1)}

.server-icon{width:56px;height:56px;border-radius:50%;object-fit:cover;background:var(--bg4);border:2px solid var(--border2)}
.server-icon-placeholder{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--orange));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0}
.server-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3}
.server-tag{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

/* STATES */
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

.empty-state{text-align:center;padding:60px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:8px}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.empty-desc{font-size:13px;color:var(--muted);line-height:1.7;max-width:380px;margin:0 auto}
.empty-desc a{color:var(--blue);text-decoration:none}
.empty-desc a:hover{text-decoration:underline}

.error-state{text-align:center;padding:40px 20px;background:rgba(255,59,59,.05);border:1px solid rgba(255,59,59,.2);border-radius:8px;color:var(--accent);font-size:13px}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>
<div class="wrap">

  <!-- TOP BAR -->
  <div class="topbar">
    <div>
      <div class="logo-mark">⚡ First Class</div>
      <div class="logo-sub">Owner Dashboard</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="user-chip">
        <div id="user-avatar-wrap"></div>
        <span id="user-name" class="user-name">Loading...</span>
      </div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- HEADING -->
  <div class="heading">
    <h1>Select a Server</h1>
    <p>Choose the server you want to manage. You can only see servers where you have Administrator permission and the bot is active.</p>
  </div>

  <!-- SERVER LIST -->
  <div id="server-list">
    <div class="loading">
      <div class="loading-spinner"></div>
      Fetching your servers...
    </div>
  </div>

</div>

<script>
async function init() {
  // Load user info
  try {
    const res  = await fetch('/auth/me');
    if (!res.ok) { window.location.href = '/login.html'; return; }
    const user = await res.json();
    document.getElementById('user-name').textContent = user.username;
    const wrap = document.getElementById('user-avatar-wrap');
    if (user.avatar) {
      const img = document.createElement('img');
      img.className   = 'user-avatar';
      img.src         = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=64`;
      img.alt         = user.username;
      wrap.appendChild(img);
    } else {
      const ph        = document.createElement('div');
      ph.className    = 'user-avatar-placeholder';
      ph.textContent  = user.username[0].toUpperCase();
      wrap.appendChild(ph);
    }
  } catch {
    window.location.href = '/login.html';
    return;
  }

  // Load guilds
  try {
    const res    = await fetch('/api/my-guilds');
    if (!res.ok) throw new Error('Failed');
    const guilds = await res.json();
    renderGuilds(guilds);
  } catch {
    document.getElementById('server-list').innerHTML = `
      <div class="error-state">⚠️ Failed to load servers. <a href="/guild-select.html" style="color:var(--blue)">Refresh</a></div>`;
  }
}

function renderGuilds(guilds) {
  const el = document.getElementById('server-list');
  if (!guilds.length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🤖</div>
        <div class="empty-title">No Servers Found</div>
        <div class="empty-desc">
          The bot isn't in any servers where you have Administrator permission.<br><br>
          <a href="https://discord.com/api/oauth2/authorize?client_id=${encodeURIComponent(window.location.hostname)}&permissions=8&scope=bot+applications.commands" target="_blank">Invite the bot to your server →</a>
        </div>
      </div>`;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'server-grid';

  for (const guild of guilds) {
    const card = document.createElement('a');
    card.className = 'server-card';
    card.href = 'javascript:void(0)';
    card.onclick = () => selectGuild(guild.id, guild.name);

    const initials = guild.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

    card.innerHTML = `
      ${guild.icon
        ? `<img class="server-icon" src="${guild.icon}" alt="${guild.name}">`
        : `<div class="server-icon-placeholder">${initials}</div>`
      }
      <div>
        <div class="server-name">${escHtml(guild.name)}</div>
        <div class="server-tag">${guild.id}</div>
      </div>`;

    grid.appendChild(card);
  }

  el.innerHTML = '';
  el.appendChild(grid);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectGuild(id, name) {
  sessionStorage.setItem('guildId', id);
  sessionStorage.setItem('guildName', name);
  window.location.href = '/';
}

function logout() {
  window.location.href = '/auth/logout';
}

init();
</script>
</body>
</html>
