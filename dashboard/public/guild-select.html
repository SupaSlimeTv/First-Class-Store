<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Server — First Class Store</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080b;color:#e0e0ee;font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none}
.header{text-align:center;margin-bottom:36px}
.logo{font-size:32px;margin-bottom:6px}
h1{font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.sub{font-size:13px;color:#60607a;margin-top:4px}
.user-bar{display:flex;align-items:center;gap:10px;background:#0f0f14;border:1px solid #262630;border-radius:8px;padding:10px 16px;margin-bottom:32px;font-size:13px}
.user-bar img{width:28px;height:28px;border-radius:50%}
.user-bar a{color:#60607a;text-decoration:none;margin-left:auto;font-size:11px}
.user-bar a:hover{color:#ff3b3b}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;width:100%;max-width:860px}
.guild-card{background:#0f0f14;border:1px solid #262630;border-radius:10px;padding:20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s;text-decoration:none;color:inherit}
.guild-card:hover{border-color:#ff3b3b;background:rgba(255,59,59,.04);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.guild-icon{width:48px;height:48px;border-radius:12px;object-fit:cover;background:#1e1e28;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.guild-icon img{width:48px;height:48px;border-radius:12px}
.guild-name{font-weight:700;font-size:15px;margin-bottom:2px}
.guild-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:#40404a}
.empty{text-align:center;color:#40404a;font-size:14px;padding:48px}
.empty strong{display:block;font-size:16px;color:#60607a;margin-bottom:8px}
.loading{text-align:center;color:#60607a;padding:48px;font-size:14px}
</style>
</head>
<body>
<div class="header">
  <div class="logo">⚡</div>
  <h1>Select a Server</h1>
  <p class="sub">Choose which server to manage</p>
</div>

<div class="user-bar" id="user-bar">
  <span style="color:#60607a">Loading...</span>
</div>

<div id="guild-grid" class="grid">
  <div class="loading">Loading your servers...</div>
</div>

<script>
async function load() {
  // Get user info
  const me = await fetch('/auth/me').then(r => r.ok ? r.json() : null);
  if (!me) { location.href = '/login.html'; return; }

  const bar = document.getElementById('user-bar');
  bar.innerHTML = `
    ${me.avatar ? `<img src="https://cdn.discordapp.com/avatars/${me.id}/${me.avatar}.png?size=32">` : ''}
    <span>Logged in as <strong>${me.username}</strong></span>
    <a href="/auth/logout">Logout</a>
  `;

  // Get guilds
  const guilds = await fetch('/api/my-guilds').then(r => r.ok ? r.json() : []);
  const grid   = document.getElementById('guild-grid');

  if (!guilds.length) {
    grid.innerHTML = `<div class="empty"><strong>No servers found</strong>Make sure the bot is in your server and you have Administrator permission.</div>`;
    return;
  }

  grid.innerHTML = guilds.map(g => `
    <a class="guild-card" href="/dashboard/${g.id}">
      <div class="guild-icon">
        ${g.icon ? `<img src="${g.icon}" alt="">` : g.name.charAt(0).toUpperCase()}
      </div>
      <div>
        <div class="guild-name">${g.name}</div>
        <div class="guild-id">${g.id}</div>
      </div>
    </a>
  `).join('');
}

load();
</script>
</body>
</html>
