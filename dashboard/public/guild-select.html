<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Server — First Class Store</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080b;color:#e0e0ee;font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 24px}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none}
.header{text-align:center;margin-bottom:32px}
.logo{font-size:36px;margin-bottom:8px}
h1{font-size:24px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#fff}
.sub{font-size:13px;color:#60607a;margin-top:6px}
.user-bar{display:flex;align-items:center;gap:10px;background:#0f0f14;border:1px solid #262630;border-radius:8px;padding:10px 16px;margin-bottom:36px;font-size:13px;max-width:860px;width:100%}
.user-bar img{width:28px;height:28px;border-radius:50%}
.user-bar a{color:#60607a;text-decoration:none;margin-left:auto;font-size:11px;transition:.15s}
.user-bar a:hover{color:#ff3b3b}
.section{width:100%;max-width:860px;margin-bottom:32px}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#40404a;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:#1e1e28}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
/* Active guild card */
.guild-card{background:#0f0f14;border:1px solid #262630;border-radius:10px;padding:18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s;text-decoration:none;color:inherit;position:relative;overflow:hidden}
.guild-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,59,59,.04) 0%,transparent 60%);opacity:0;transition:.15s}
.guild-card:hover{border-color:#ff3b3b;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.guild-card:hover::before{opacity:1}
.guild-card .badge{position:absolute;top:10px;right:10px;background:rgba(46,204,113,.15);color:#2ecc71;border:1px solid rgba(46,204,113,.3);border-radius:4px;font-size:9px;font-weight:700;padding:2px 6px;text-transform:uppercase;letter-spacing:.06em}
/* Add bot card */
.add-card{background:#0f0f14;border:1px solid #262630;border-radius:10px;padding:18px;display:flex;align-items:center;gap:14px;transition:all .15s;color:inherit;position:relative;overflow:hidden}
.add-card:hover{border-color:#5865f2;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.add-btn{margin-left:auto;flex-shrink:0;background:#5865f2;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:.15s;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.add-btn:hover{background:#4752c4;transform:scale(1.05)}
.guild-icon{width:48px;height:48px;border-radius:12px;background:#1e1e28;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0;overflow:hidden;color:#fff}
.guild-icon img{width:48px;height:48px;object-fit:cover}
.guild-name{font-weight:700;font-size:15px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.guild-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:#40404a}
.empty{text-align:center;color:#40404a;font-size:14px;padding:32px;background:#0f0f14;border:1px solid #1e1e28;border-radius:10px}
.loading{text-align:center;color:#60607a;padding:48px;font-size:14px}
.remove-btn{position:absolute;top:8px;right:8px;background:rgba(255,59,59,.15);border:1px solid rgba(255,59,59,.3);color:#ff3b3b;border-radius:50%;width:22px;height:22px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;font-weight:700;z-index:10;line-height:1}
.remove-btn:hover{background:rgba(255,59,59,.35);border-color:#ff3b3b;transform:scale(1.1)}
</style>
</head>
<body>

<div class="header">
  <div class="logo">⚡</div>
  <h1>First Class Store</h1>
  <p class="sub">Select a server to manage</p>
</div>

<div class="user-bar" id="user-bar">
  <span style="color:#60607a">Loading...</span>
</div>

<div id="content" style="width:100%;max-width:860px">
  <div class="loading">Loading your servers...</div>
</div>

<script>
const BOT_INVITE = `https://discord.com/oauth2/authorize?client_id=${location.hostname === 'localhost' ? 'YOUR_CLIENT_ID' : ''}&permissions=8&scope=bot%20applications.commands`;

async function load() {
  const me = await fetch('/auth/me').then(r => r.ok ? r.json() : null);
  if (!me) { location.href = '/login.html'; return; }

  // Fetch client ID from meta if possible
  const clientIdMeta = document.querySelector('meta[name="client-id"]');
  const inviteUrl = (guildId) => `https://discord.com/oauth2/authorize?client_id=${window._clientId||''}&permissions=8&scope=bot%20applications.commands&guild_id=${guildId}&disable_guild_select=true`;

  document.getElementById('user-bar').innerHTML = `
    ${me.avatar ? `<img src="https://cdn.discordapp.com/avatars/${me.id}/${me.avatar}.png?size=32">` : '⚡'}
    <span>Logged in as <strong>${me.username}</strong></span>
    <a href="/auth/logout">Logout</a>
  `;

  const data = await fetch('/api/my-guilds').then(r => r.ok ? r.json() : { botGuilds:[], addableGuilds:[] });
  // Support old array format too
  const botGuilds    = Array.isArray(data) ? data : (data.botGuilds || []);
  const addableGuilds= Array.isArray(data) ? [] :  (data.addableGuilds || []);
  const cid          = data.clientId || '';
  window._clientId   = cid;

  const content = document.getElementById('content');

  let html = '';

  // ── Servers with bot ───────────────────────────────────────
  html += `<div class="section">
    <div class="section-label">🟢 Manage — Bot is in these servers</div>
    <div class="grid">`;

  if (!botGuilds.length) {
    html += `<div class="empty">No managed servers yet. Add the bot to a server below.</div>`;
  } else {
    html += botGuilds.map(g => `
      <div style="position:relative">
        <a class="guild-card" href="/dashboard/${g.id}">
          <div class="badge">Manage</div>
          <div class="guild-icon">${g.icon ? `<img src="${g.icon}">` : g.name.charAt(0).toUpperCase()}</div>
          <div>
            <div class="guild-name">${g.name}</div>
            <div class="guild-id">${g.id}</div>
          </div>
        </a>
        ${g.isOwner ? `<button class="remove-btn" onclick="removeBot('${g.id}','${g.name}',event)" title="Remove bot from server">✕</button>` : ''}
      </div>`).join('');
  }
  html += `</div></div>`;

  // ── Servers without bot ────────────────────────────────────
  if (addableGuilds.length) {
    html += `<div class="section">
      <div class="section-label">➕ Add Bot — You have admin in these servers</div>
      <div class="grid">`;
    html += addableGuilds.map(g => `
      <div class="add-card">
        <div class="guild-icon">${g.icon ? `<img src="${g.icon}">` : g.name.charAt(0).toUpperCase()}</div>
        <div style="min-width:0">
          <div class="guild-name">${g.name}</div>
          <div class="guild-id">${g.id}</div>
        </div>
        <button class="add-btn" onclick="addBot('${g.id}','${g.name}')">+ Add Bot</button>
      </div>`).join('');
    html += `</div></div>`;
  }

  content.innerHTML = html;
}

function addBot(guildId, name) {
  const cid = window._clientId;
  if (!cid) { alert('Bot client ID not loaded. Please try refreshing.'); return; }
  const url = `https://discord.com/oauth2/authorize?client_id=${cid}&permissions=8&scope=bot%20applications.commands&guild_id=${guildId}&disable_guild_select=true`;
  window.open(url, '_blank', 'width=500,height=700');
}

async function removeBot(guildId, name, event) {
  event.preventDefault();
  event.stopPropagation();
  if (!confirm(`Remove the bot from "${name}"?\n\nAll dashboard access to this server will be lost. Economy data stays saved.`)) return;
  const r = await fetch(`/api/${guildId}/leave`, { method:'POST', credentials:'include' }).then(r => r.json()).catch(() => ({}));
  if (r.success) {
    alert(`Bot removed from ${name}. Refresh to update the list.`);
    load();
  } else {
    alert(r.error || 'Failed to remove bot. Make sure you are the server owner.');
  }
}

load();
</script>
</body>
</html>
