<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080b;--bg2:#0f0f14;--bg3:#16161e;--bg4:#1e1e28;--border:#262630;--border2:#343444;--text:#e0e0ee;--muted:#60607a;--accent:#ff3b3b;--gold:#f5c518;--green:#2ecc71;--blue:#5865f2}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);pointer-events:none;z-index:0}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,59,59,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,59,59,.03) 1px,transparent 1px);background-size:40px 40px;z-index:0;animation:gridDrift 20s linear infinite}
@keyframes gridDrift{0%{background-position:0 0}100%{background-position:40px 40px}}
.glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(255,59,59,.08) 0%,transparent 70%);pointer-events:none;z-index:0}
.card{position:relative;z-index:1;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:48px 52px;width:440px;max-width:96vw;box-shadow:0 32px 80px rgba(0,0,0,.6)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),#ff6b35,var(--accent));border-radius:12px 12px 0 0}
.logo{text-align:center;margin-bottom:36px}
.logo-icon{font-size:42px;margin-bottom:10px}
.logo-title{font-size:26px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text)}
.logo-sub{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:4px;letter-spacing:.08em}
.info-row{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;margin-bottom:10px}
.info-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.info-text{font-size:13px;color:var(--muted);line-height:1.6}
.info-text strong{color:var(--text)}
.btn-discord{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;text-decoration:none;transition:all .2s;margin-top:24px}
.btn-discord:hover{background:#4752c4;transform:translateY(-1px);box-shadow:0 8px 24px rgba(88,101,242,.3)}
.discord-logo{width:22px;height:22px;fill:white}
.error-box{background:rgba(255,59,59,.08);border:1px solid rgba(255,59,59,.25);border-radius:6px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:var(--accent);display:none;text-align:center}
.error-box.show{display:block}
.footer{text-align:center;margin-top:24px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-title">First Class</div>
    <div class="logo-sub">Owner Dashboard</div>
  </div>
  <div id="error-box" class="error-box"></div>
  <div class="info-row">
    <span class="info-icon">🔐</span>
    <div class="info-text"><strong>Server admins only.</strong> You must be the owner or have Administrator permission in a server where this bot is active.</div>
  </div>
  <div class="info-row">
    <span class="info-icon">🌍</span>
    <div class="info-text">After logging in you'll pick <strong>which server</strong> to manage. Each server's economy is fully isolated.</div>
  </div>
  <a href="/auth/login" class="btn-discord">
    <svg class="discord-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.004.028.02.057.04.074a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
    Login with Discord
  </a>
  <div class="footer">Secured via Discord OAuth2</div>
</div>
<script>
const p=new URLSearchParams(window.location.search),err=p.get('error'),box=document.getElementById('error-box');
if(err){const m={no_code:'Authorization cancelled.',token_failed:'Failed to get access token. Try again.',user_failed:'Could not fetch your Discord profile.',oauth_error:'OAuth error. Please try again.'};box.textContent=m[err]||'Something went wrong. Please try again.';box.classList.add('show');}
</script>
</body>
</html>
